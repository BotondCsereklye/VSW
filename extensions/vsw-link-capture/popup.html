<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VSW Link Capture</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        width: 340px;
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: #f4f7fb;
        color: #132844;
      }

      main {
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 1rem;
      }

      .brand {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .brand img {
        width: 38px;
        height: 38px;
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(19, 40, 68, 0.16);
      }

      .brand-copy {
        display: grid;
        gap: 3px;
      }

      p {
        margin: 0;
        font-size: 0.88rem;
        line-height: 1.4;
        color: #3f5f7f;
      }

      .panel {
        display: grid;
        gap: 8px;
        padding: 12px;
        border: 1px solid #d8e2ee;
        border-radius: 8px;
        background: #ffffff;
      }

      .settings-summary {
        display: grid;
        gap: 8px;
      }

      .settings-summary dl {
        display: grid;
        gap: 6px;
        margin: 0;
      }

      .settings-summary div {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font-size: 0.82rem;
        color: #27486a;
      }

      .settings-summary dt,
      .settings-summary dd {
        margin: 0;
      }

      .settings-summary dd {
        font-weight: 700;
        color: #132844;
      }

      .panel label {
        display: grid;
        gap: 4px;
        font-size: 0.8rem;
        font-weight: 600;
        color: #27486a;
      }

      input[type="text"],
      input[type="number"] {
        border: 1px solid #c9d7e7;
        border-radius: 8px;
        padding: 9px 10px;
        font: inherit;
        color: #132844;
        background: #fff;
      }

      button {
        border: 0;
        border-radius: 8px;
        background: #22756a;
        color: #fff;
        font-weight: 700;
        font-size: 0.9rem;
        padding: 10px 12px;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      .secondary-button {
        border: 1px solid #c9d7e7;
        background: #ffffff;
        color: #132844;
      }

      .status {
        min-height: 34px;
        font-size: 0.84rem;
        line-height: 1.35;
      }

      .status[data-state="ok"] {
        color: #1d6b46;
      }

      .status[data-state="warning"] {
        color: #a16207;
      }

      .status[data-state="error"] {
        color: #b2342d;
      }

    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <img src="icons/vsw-icon-48.png" alt="" aria-hidden="true" />
        <div class="brand-copy">
          <h1>VSW Link Capture</h1>
          <p>Trigger defensive scans in your local VSW backend before or while you browse.</p>
        </div>
      </div>
      <section class="panel">
        <label for="manualTargetInput">Scan and visit target</label>
        <input
          id="manualTargetInput"
          type="text"
          placeholder="youtube.com or https://example.com"
          autocomplete="off"
        />
        <button id="scanTargetButton" type="button">Scan and visit target</button>
      </section>
      <section class="panel settings-summary" aria-label="Visit gate status">
        <p>Visit gate settings are managed in the VSW dashboard.</p>
        <dl>
          <div>
            <dt>Live capture</dt>
            <dd id="liveCaptureStatus">Unknown</dd>
          </div>
          <div>
            <dt>Minimum score</dt>
            <dd id="minimumScoreStatus">Unknown</dd>
          </div>
          <div>
            <dt>Score blocking</dt>
            <dd id="scoreBlockingStatus">Unknown</dd>
          </div>
          <div>
            <dt>Backend</dt>
            <dd id="backendStatus">Unknown</dd>
          </div>
        </dl>
      </section>
      <button id="retryConnectionButton" class="secondary-button" type="button">Retry connection</button>
      <button id="scanCurrentPageButton" type="button">Scan current page</button>
      <button id="openDashboardButton" class="secondary-button" type="button">Open VSW dashboard</button>
      <div id="status" class="status" data-state="idle"></div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
