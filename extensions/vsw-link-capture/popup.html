<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VSW Link Capture</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        width: 340px;
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: #f4f7fb;
        color: #132844;
      }

      main {
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 1rem;
      }

      p {
        margin: 0;
        font-size: 0.88rem;
        line-height: 1.4;
        color: #3f5f7f;
      }

      .panel {
        display: grid;
        gap: 8px;
        padding: 12px;
        border: 1px solid #d8e2ee;
        border-radius: 8px;
        background: #ffffff;
      }

      .panel label {
        display: grid;
        gap: 4px;
        font-size: 0.8rem;
        font-weight: 600;
        color: #27486a;
      }

      input[type="text"],
      input[type="number"] {
        border: 1px solid #c9d7e7;
        border-radius: 8px;
        padding: 9px 10px;
        font: inherit;
        color: #132844;
        background: #fff;
      }

      button {
        border: 0;
        border-radius: 8px;
        background: #22756a;
        color: #fff;
        font-weight: 700;
        font-size: 0.9rem;
        padding: 10px 12px;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      .status {
        min-height: 34px;
        font-size: 0.84rem;
        line-height: 1.35;
      }

      .status[data-state="ok"] {
        color: #1d6b46;
      }

      .status[data-state="error"] {
        color: #b2342d;
      }

      .toggles {
        display: grid;
        gap: 8px;
        font-size: 0.82rem;
        color: #27486a;
      }

      .toggles label {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .toggles .threshold-row {
        display: grid;
        grid-template-columns: 1fr 72px;
        gap: 8px;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>VSW Link Capture</h1>
      <p>Trigger defensive scans in your local VSW backend before or while you browse.</p>
      <section class="panel">
        <label for="manualTargetInput">Scan and visit target</label>
        <input
          id="manualTargetInput"
          type="text"
          placeholder="youtube.com or https://example.com"
          autocomplete="off"
        />
        <button id="scanTargetButton" type="button">Scan and visit target</button>
      </section>
      <section class="toggles">
        <label>
          <input id="liveCaptureEnabled" type="checkbox" />
          Enable live click capture
        </label>
        <label>
          <input id="blockOnScanFailure" type="checkbox" />
          Block navigation on pre-scan failure
        </label>
        <label class="threshold-row">
          <span>Minimum allowed score</span>
          <input id="minimumAllowedScore" type="number" min="0" max="100" step="1" />
        </label>
        <label>
          <input id="blockBelowMinimumScore" type="checkbox" />
          Block navigation when the score is below the minimum
        </label>
      </section>
      <button id="scanCurrentPageButton" type="button">Scan current page</button>
      <div id="status" class="status" data-state="idle"></div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
